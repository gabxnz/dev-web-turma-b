<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista To-Do usando Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #app {
            background-color: #1e1e26;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #2980b9;
        }

        h1 {
            color: #ecf0f1;
            font-size: 22px;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .area-adicionar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2c2c34;
            color: white;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        .btn-adicionar {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-adicionar:hover {
            background-color: #3498db;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background-color: #2c2c34;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #34495e;
        }

        .texto-tarefa {
            flex: 1;
            margin-left: 10px;
            color: #bdc3c7;
        }

        .concluida {
            text-decoration: line-through;
            color: #7f8c8d;
            opacity: 0.6;
        }

        .btn-remover {
            background-color: #000000;
            color: #bdc3c7;
            border: 1px solid #333;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-remover:hover {
            background-color: #c0392b;
            color: white;
            border-color: #c0392b;
        }

        input[type="checkbox"] {
            cursor: pointer;
            accent-color: #3498db;
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>Minhas Tarefas</h1>

        <div class="area-adicionar">
            <input type="text" v-model="novaTarefa" @keyup.enter="adicionarTarefa" placeholder="O que precisa ser feito?" title="Campo para nova tarefa">
            <button class="btn-adicionar" @click="adicionarTarefa">Ok</button>
        </div>

        <ul>
            <li v-for="(tarefa, index) in tarefas" :key="index">
                <input type="checkbox" v-model="tarefa.concluida" title="Marcar como concluída">
                
                <span class="texto-tarefa" :class="{ concluida: tarefa.concluida }">
                    {{ tarefa.texto }}
                </span>

                <button class="btn-remover" @click="removerTarefa(index)">Excluir</button>
            </li>
        </ul>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    novaTarefa: '',
                    tarefas: []
                }
            },
            methods: {
                adicionarTarefa() {
                    if (this.novaTarefa.trim() !== '') {
                        this.tarefas.push({
                            texto: this.novaTarefa,
                            concluida: false
                        });
                        this.novaTarefa = '';
                    }
                },
                removerTarefa(index) {
                    this.tarefas.splice(index, 1);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
