<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista to-do usando Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #app {
            background-color: #1e1e26;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .area-adicionar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            background-color: #2c2c34;
            color: white;
            border: 1px solid #333;
        }
        button {
            cursor: pointer;
            padding: 10px;
            border: none;
            font-weight: bold;
        }
        .btn-adicionar { background-color: #2980b9; color: white; }
        .btn-remover { background-color: #c0392b; color: white; }
        ul { list-style: none; padding: 0; }
        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background-color: #2c2c34;
            margin-bottom: 8px;
        }
        .texto-tarefa { flex: 1; margin-left: 10px; }
        .concluida { text-decoration: line-through; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="app">
        <h1>Minhas Tarefas</h1>

        <div class="area-adicionar">
            <input type="text" v-model="novaTarefa" title="Nova tarefa">
            <button class="btn-adicionar" @click="adicionarTarefa">Ok</button>
        </div>

        <ul>
            <li v-for="(tarefa, index) in tarefas" :key="index">
                
                <input type="checkbox" v-model="tarefa.concluida" title="Concluir">
                
                <span class="texto-tarefa" :class="{ concluida: tarefa.concluida }">
                    {{ tarefa.texto }}
                </span>

                <button class="btn-remover" @click="removerTarefa(index)">Excluir</button>
            </li>
        </ul>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    novaTarefa: '',
                    tarefas: []
                }
            },
            methods: {
                adicionarTarefa() {
                    if (this.novaTarefa !== '') {
                        this.tarefas.push({
                            texto: this.novaTarefa,
                            concluida: false
                        });
                        this.novaTarefa = '';
                    }
                },
                removerTarefa(index) {
                    this.tarefas.splice(index, 1);
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
